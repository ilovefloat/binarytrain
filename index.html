<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Sequence Riddle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .bit-card { 
            transition: all 0.2s ease;
            user-select: none;
        }

        .bit-active { 
            background-color: #4f46e5; 
            color: #ffffff; 
            border-color: #6366f1;
        }

        .bit-inactive { 
            background-color: #0f172a; 
            color: #475569; 
            border-color: #1e293b; 
        }

        .panel-bg {
            background: #0f172a;
            border: 1px solid #1e293b;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center overflow-hidden">

    <div class="w-full max-w-md h-screen flex flex-col px-5">
        <!-- Header -->
        <header class="pt-8 pb-6 flex-shrink-0">
            <h1 class="text-xl font-bold tracking-tight text-white mb-1">Binary Sequence Riddle</h1>
            <p class="text-slate-500 text-[11px] leading-relaxed">
                Find the secret binary code. Each check shows the number of bits that do not match the target.
            </p>
            
            <!-- Selection -->
            <div class="mt-6 flex gap-2 p-1 bg-slate-900/50 rounded-xl border border-slate-800">
                <button onclick="changeLevel(5)" id="lvl-5" class="lvl-btn flex-1 py-2 rounded-lg font-bold text-[11px] transition-all">Length 5</button>
                <button onclick="changeLevel(10)" id="lvl-10" class="lvl-btn flex-1 py-2 rounded-lg font-bold text-[11px] transition-all">Length 10</button>
                <button onclick="changeLevel(15)" id="lvl-15" class="lvl-btn flex-1 py-2 rounded-lg font-bold text-[11px] transition-all">Length 15</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main id="game-ui" class="hidden flex-grow flex flex-col min-h-0 space-y-6 animate-fade">
            
            <!-- Input Grid -->
            <section class="panel-bg rounded-2xl p-5 relative">
                <div id="lock-screen" class="hidden absolute inset-0 bg-emerald-500/5 backdrop-blur-[1px] flex items-center justify-center z-10 rounded-2xl">
                    <span class="bg-emerald-600 text-white px-3 py-1 rounded-full font-bold text-[10px] tracking-wider uppercase">Solved</span>
                </div>

                <div class="flex flex-col items-center">
                    <div id="grid-display" class="grid grid-cols-5 gap-3 mb-6 w-full">
                        <!-- Bits generated here -->
                    </div>

                    <button id="check-btn" onclick="checkCode()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm transition-all active:scale-[0.98] shadow-lg shadow-indigo-900/20">
                        Check
                    </button>
                </div>
            </section>

            <!-- History Log -->
            <section class="flex-grow flex flex-col min-h-0">
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">History</h3>
                    <div class="flex items-center gap-3">
                        <button id="reset-btn" onclick="resetLevel(activeLevel)" class="hidden text-[10px] text-indigo-400 font-bold uppercase tracking-wide hover:underline">New Secret</button>
                        <span id="counter-ui" class="mono text-[10px] text-slate-400 bg-slate-900 px-2 py-0.5 rounded border border-slate-800">00 Tries</span>
                    </div>
                </div>

                <div id="history-log" class="flex-grow overflow-y-auto custom-scroll space-y-2 pb-6">
                    <!-- Logs injected here -->
                </div>
            </section>
        </main>

        <!-- Placeholder -->
        <div id="empty-state" class="flex-grow flex items-center justify-center opacity-40">
            <p class="text-[11px] uppercase tracking-[0.2em]">Select length to start</p>
        </div>
    </div>

    <!-- Success Feedback -->
    <div id="modal-success" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-6 z-50 hidden">
        <div class="panel-bg rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl animate-fade">
            <div class="text-emerald-500 mb-4 text-3xl font-bold">✓</div>
            <h2 class="text-lg font-bold text-white mb-2 uppercase">Correct Code</h2>
            <div id="final-stats" class="mono text-slate-400 mb-6 text-[11px] bg-slate-950 p-3 rounded-lg border border-slate-800"></div>
            
            <div class="space-y-2">
                <button onclick="resetLevel(activeLevel)" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-wider">Start New Session</button>
                <button onclick="closeModal()" class="w-full py-3 bg-slate-800 text-slate-400 rounded-xl font-bold text-[10px] uppercase">Close</button>
            </div>
        </div>
    </div>

    <script>
        const store = {
            5: { target: null, logs: [], isSolved: false, input: [] },
            10: { target: null, logs: [], isSolved: false, input: [] },
            15: { target: null, logs: [], isSolved: false, input: [] }
        };

        let activeLevel = 5;

        function generateSecret(n) {
            return Array.from({ length: n }, () => Math.random() > 0.5 ? 1 : 0);
        }

        function changeLevel(n) {
            activeLevel = n;
            const data = store[n];

            if (!data.target) {
                data.target = generateSecret(n);
                data.input = Array(n).fill(0);
            }

            // Update Level Tabs
            document.querySelectorAll('.lvl-btn').forEach(btn => {
                btn.className = "lvl-btn flex-1 py-2 rounded-lg font-bold text-[11px] text-slate-500 transition-all";
            });
            document.getElementById(`lvl-${n}`).className = "lvl-btn flex-1 py-2 rounded-lg font-bold text-[11px] bg-indigo-600 text-white shadow-lg";

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');

            renderGrid();
            renderHistory();
        }

        function renderGrid() {
            const grid = document.getElementById('grid-display');
            const data = store[activeLevel];
            grid.innerHTML = '';

            data.input.forEach((val, idx) => {
                const btn = document.createElement('button');
                const height = activeLevel === 15 ? 'h-10' : 'h-14';
                btn.className = `bit-card ${height} mono rounded-xl border-2 font-bold text-lg flex items-center justify-center ${val === 1 ? 'bit-active' : 'bit-inactive'}`;
                btn.innerText = val;
                
                if (!data.isSolved) {
                    btn.onclick = () => {
                        data.input[idx] = 1 - val;
                        renderGrid();
                    };
                } else {
                    btn.classList.add('opacity-30', 'cursor-not-allowed');
                }
                grid.appendChild(btn);
            });

            const checkBtn = document.getElementById('check-btn');
            const lockScreen = document.getElementById('lock-screen');
            const resetBtn = document.getElementById('reset-btn');

            if (data.isSolved) {
                checkBtn.classList.add('hidden');
                lockScreen.classList.remove('hidden');
                resetBtn.classList.remove('hidden');
            } else {
                checkBtn.classList.remove('hidden');
                lockScreen.classList.add('hidden');
                resetBtn.classList.add('hidden');
            }
        }

        function checkCode() {
            const data = store[activeLevel];
            if (data.isSolved) return;

            let diff = 0;
            for (let i = 0; i < data.input.length; i++) {
                if (data.input[i] !== data.target[i]) diff++;
            }

            const now = new Date();
            const timestamp = now.toTimeString().split(' ')[0];

            data.logs.unshift({
                sequence: [...data.input].join(''),
                mismatches: diff,
                time: timestamp
            });

            if (diff === 0) {
                data.isSolved = true;
                showSuccess(data);
            }

            renderGrid();
            renderHistory();
        }

        function renderHistory() {
            const data = store[activeLevel];
            const container = document.getElementById('history-log');
            const counter = document.getElementById('counter-ui');
            
            counter.innerText = `${String(data.logs.length).padStart(2, '0')} TRIES`;

            if (data.logs.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-800 py-12 italic text-[10px] tracking-widest uppercase border border-slate-900 rounded-2xl">No attempts yet</div>`;
                return;
            }

            container.innerHTML = data.logs.map(log => `
                <div class="flex items-center justify-between p-4 bg-slate-900/40 border border-slate-800 rounded-xl animate-fade">
                    <div class="flex flex-col min-w-0">
                        <span class="mono text-[11px] tracking-[0.2em] text-slate-200 truncate font-bold">${log.sequence}</span>
                        <span class="text-[8px] text-slate-600 font-bold mt-1 uppercase mono tracking-tight">${log.time}</span>
                    </div>
                    <div class="flex items-center gap-4 ml-2">
                        <div class="text-right">
                            <div class="text-[7px] text-slate-600 font-bold uppercase tracking-wider mb-0.5">Mismatches</div>
                            <div class="text-base font-bold ${log.mismatches === 0 ? 'text-emerald-500' : 'text-indigo-400'} mono leading-none">${log.mismatches}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showSuccess(data) {
            const modal = document.getElementById('modal-success');
            const finalStats = document.getElementById('final-stats');
            finalStats.innerHTML = `CODE: ${data.target.join('')}<br>FOUND IN ${data.logs.length} ATTEMPTS`;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-success').classList.add('hidden');
        }

        function resetLevel(n) {
            store[n] = {
                target: generateSecret(n),
                logs: [],
                isSolved: false,
                input: Array(n).fill(0)
            };
            closeModal();
            changeLevel(n);
        }
    </script>
</body>
</html>
